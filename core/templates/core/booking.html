{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url("https://wallpaperaccess.com/full/124518.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .booking-container {
            /* Gradient Form Background */
            background: linear-gradient(135deg, #16e8d6 0%, #0523b7 100%);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Inner white container for better readability */
        .form-inner {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        input[type="text"],
        input[type="number"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        /* Input Focus Glow Effect */
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5),
                        0 0 20px rgba(102, 126, 234, 0.3);
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
        }

        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            margin-right: 8px;
            accent-color: #667eea;
        }

        fieldset {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        legend {
            font-weight: bold;
            color: #34495e;
            padding: 0 5px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .col {
            flex: 1;
        }

        .checkbox-group {
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #555;
        }

        .error-msg {
            color: red;
            font-size: 0.85em;
            display: none;
            margin-top: 5px;
        }

        button.submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb);
            background-size: 200% 200%;
            animation: gradientBG 3s ease infinite;
            color: rgb(15, 14, 14);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(72, 219, 251, 0.5);
        }

        .home-link {
            text-align: center;
            margin-top: 15px;
        }

        .home-link a {
            text-decoration: none;
            color: white;
            font-weight: 600;
        }

        .home-link a:hover {
            text-decoration: underline;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 600px) {
            .row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="booking-container">
    <!-- Inner form container -->
    <div class="form-inner">
        <h2>Booking Form</h2>
        <form id="bookingForm">
            
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" min="18" max="120" placeholder="Enter Your Age" required>
                </div>
                
                <div class="col form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male" required> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="transgender"> Transgender</label>
                    </div>
                </div>
            </div>

            <!-- Phone Section with Validation -->
            <div class="form-group">
                <label for="phone">Phone Number (With Country Code)</label>
                <div style="display: flex; gap: 10px;">
                    <select name="country_code" style="width: 80px;" required>
                        <option value="+1">+1</option>
                        <option value="+44">+44</option>
                        <option value="+91" selected>+91</option>
                        <option value="+61">+61</option>
                        <option value="+81">+81</option>
                    </select>
                    <!-- Added maxlength="10" and ID for validation -->
                    <input type="tel" id="phone" name="phone" maxlength="10" placeholder="Enter Your Number" required>
                </div>
                <div id="phoneError" class="error-msg">Phone must start with 6-9 and be 10 digits.</div>
            </div>

            <!-- Date Section -->
            <div class="row">
                <div class="col form-group">
                    <label for="start_date">Start Date</label>
                    <input type="datetime-local" id="start_date" required>
                </div>
                <div class="col form-group">
                    <label for="end_date">End Date</label>
                    <input type="datetime-local" id="end_date" required>
                    <div id="dateError" class="error-msg">End date must be after start date.</div>
                </div>
            </div>

            <fieldset>
                <legend>Address Details</legend>

                <div class="checkbox-group">
                    <input type="checkbox" id="same_address" onchange="copyAddress()">
                    Current address is same as Permanent
                </div>

                <div class="form-group">
                    <label for="permanent_address">Permanent Address</label>
                    <textarea id="permanent_address" name="permanent_address" placeholder="Enter Address" required></textarea>
                </div>

                <div class="form-group">
                    <label for="current_address">Current Address</label>
                    <textarea id="current_address" name="current_address" required></textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend>Identity Proof (Select One)</legend>
                <div class="radio-group">
                    <label><input type="radio" name="id_card" value="adhar" checked> Aadhar Card</label>
                    <label><input type="radio" name="id_card" value="pan"> PAN Card</label>
                    <label><input type="radio" name="id_card" value="voter"> Voter ID</label>
                </div>

                <div class="form-group" style="margin-top: 10px;">
                    <label for="id_number">ID Number</label>
                    <input type="text" id="id_number" name="id_number" placeholder="Enter ID Number here" required>
                </div>
            </fieldset>

            <div class="row">
                <div class="col form-group">
                    <label for="adults">Number of Adults</label>
                    <input type="number" id="adults" name="adults" min="1" value="1" required>
                </div>
                <div class="col form-group">
                    <label for="children">Number of Children</label>
                    <input type="number" id="children" name="children" min="0" value="0">
                </div>
            </div>

            <button type="submit" class="submit-btn">Book Now</button>
        </form>
    </div>

    <div class="home-link">
        <a href="{% url 'index' %}">⬅ Back to Home</a>
    </div>
</div>

<script>
    // --- 1. Address Copy Logic (From Version 2) ---
    function copyAddress() {
        const checkbox = document.getElementById('same_address');
        const permAddress = document.getElementById('permanent_address');
        const currAddress = document.getElementById('current_address');
        
        if (checkbox.checked) {
            currAddress.value = permAddress.value;
            currAddress.disabled = true;
        } else {
            currAddress.value = '';
            currAddress.disabled = false;
        }
    }

    // --- 2. Phone Validation Logic (From Version 1) ---
    const phoneInput = document.getElementById("phone");
    const phoneError = document.getElementById("phoneError");
    const phoneRegex = /^[6-9]\d{9}$/;

    // Prevent typing non-numbers and enforce 10 digits
    phoneInput.addEventListener("input", function(e){
        // Remove any non-numeric characters
        this.value = this.value.replace(/[^0-9]/g, '');
        
        // Check length and show error if it's not 10 digits
        if(this.value.length > 0 && this.value.length < 10) {
            phoneError.style.display = "block";
            phoneError.textContent = "Please enter a valid 10-digit number.";
        } else if (this.value.length === 10) {
            phoneError.style.display = "none";
        }
    });

    // --- 3. Date Validation Logic (From Version 1) ---
    const startDate = document.getElementById("start_date");
    const endDate = document.getElementById("end_date");
    const dateError = document.getElementById("dateError");

    // --- 4. Form Submission Logic (Combined) ---
    const form = document.getElementById("bookingForm");

    form.addEventListener("submit", function(e){
        let valid = true;

        // Check Phone
        if(!phoneRegex.test(phoneInput.value)){
            phoneError.style.display = "block";
            phoneError.textContent = "Phone must start with 6-9 and be 10 digits.";
            valid = false;
        } else {
            phoneError.style.display = "none";
        }

        // Check Dates
        if(new Date(endDate.value) <= new Date(startDate.value)){
            dateError.style.display = "block";
            valid = false;
        } else {
            dateError.style.display = "none";
        }

            if(!valid){
        e.preventDefault();
    } else {
        alert("🎉 Booking Successful!");
    }

});
</script>
</body>
</html>
